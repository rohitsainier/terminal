name: Release BharatLink CLI

on:
  push:
    tags:
      - 'cli-v*'  # Trigger on tags like cli-v0.2.2
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. cli-v0.2.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p bharatlink

      # ─── Package (Unix) ──────────────────────────────────────────────
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          VERSION="${GITHUB_REF_NAME#cli-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#cli-v}"
          fi
          ARCHIVE="bharatlink-${VERSION}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/bharatlink" "${ARCHIVE}/"
          cp README.md "${ARCHIVE}/" 2>/dev/null || true
          cp LICENSE "${ARCHIVE}/" 2>/dev/null || true
          tar -czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      # ─── Package (Windows) ───────────────────────────────────────────
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("cli-v", "")
          if ([string]::IsNullOrEmpty($version) -or $version -eq "${{ github.ref_name }}") {
            $version = "${{ github.event.inputs.tag }}".Replace("cli-v", "")
          }
          $archive = "bharatlink-${version}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $archive
          Copy-Item "target/${{ matrix.target }}/release/bharatlink.exe" "$archive/"
          if (Test-Path "README.md") { Copy-Item "README.md" "$archive/" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$archive/" }
          Compress-Archive -Path "$archive/*" -DestinationPath "${archive}.zip"
          echo "ARCHIVE=${archive}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bharatlink-${{ matrix.label }}
          path: ${{ env.ARCHIVE }}

  # ─── Create GitHub Release ─────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#cli-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#cli-v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "BharatLink CLI v${{ steps.version.outputs.version }}"
          body: |
            ## BharatLink CLI v${{ steps.version.outputs.version }}

            P2P file & text sharing from your terminal. No servers, no accounts.

            ### Install

            **One-liner (macOS/Linux):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/rohitsainier/terminal/main/install.sh | sh
            ```

            **Cargo:**
            ```bash
            cargo install bharatlink
            ```

            **Homebrew (macOS):**
            ```bash
            brew install rohitsainier/tap/bharatlink
            ```

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (M1/M2/M3) | `bharatlink-*-aarch64-apple-darwin.tar.gz` |
            | macOS | Intel | `bharatlink-*-x86_64-apple-darwin.tar.gz` |
            | Linux | x86_64 | `bharatlink-*-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux | ARM64 | `bharatlink-*-aarch64-unknown-linux-gnu.tar.gz` |
            | Windows | x86_64 | `bharatlink-*-x86_64-pc-windows-msvc.zip` |

            ### Quick Start
            ```bash
            bharatlink start              # Start the P2P node
            bharatlink send file <peer> ./photo.jpg
            bharatlink send text <peer> "hello!"
            ```
          draft: false
          prerelease: false
          files: artifacts/**/*
